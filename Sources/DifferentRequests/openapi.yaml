openapi: 3.1.0
info:
  title: DifferentRequests SDK API
  description: Feature request management API for mobile and web apps.
  version: 1.0.0

servers:
  - url: https://kstb23efj8.execute-api.us-east-1.amazonaws.com
    description: Production
  - url: https://urvselrxwj.execute-api.us-east-1.amazonaws.com
    description: Development

security:
  - ApiKeyAuth: []

paths:
  /apps:
    post:
      operationId: registerApp
      summary: Register a new app
      description: Creates a new app and returns the API key. The key is shown once and must be stored by the caller.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: App registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRegistration"
        "400":
          $ref: "#/components/responses/BadRequest"

  /apps/{appId}:
    get:
      operationId: getApp
      summary: Get app metadata
      security:
        - ApiKeyAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      operationId: createUser
      summary: Create or update an SDK user
      description: Registers a user and returns a session token for authenticated operations.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalUserId, displayName]
              properties:
                externalUserId:
                  type: string
                  minLength: 1
                displayName:
                  type: string
                  minLength: 1
                avatarUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: User created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests:
    get:
      operationId: listRequests
      summary: List feature requests
      security:
        - ApiKeyAuth: []
      parameters:
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/SortOrder"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RequestStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRequests"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: submitRequest
      summary: Submit a new feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests/search:
    get:
      operationId: searchRequests
      summary: Search requests by title
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Matching requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests/{requestId}:
    get:
      operationId: getRequest
      summary: Get a single feature request
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        "301":
          description: Request was merged into another
          content:
            application/json:
              schema:
                type: object
                required: [mergedIntoId]
                properties:
                  mergedIntoId:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{requestId}/vote:
    post:
      operationId: vote
      summary: Vote on a feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: integer
                  enum: [1, -1, 0]
                  description: "1 = upvote, -1 = downvote, 0 = remove vote"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /decline-reasons:
    get:
      operationId: listDeclineReasons
      summary: List decline reasons for the app
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: List of decline reasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeclineReason"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createDeclineReason
      summary: Create a custom decline reason
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Decline reason created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeclineReason"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /decline-reasons/{reasonId}:
    delete:
      operationId: deleteDeclineReason
      summary: Delete a custom decline reason
      description: Only non-default decline reasons can be deleted.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: reasonId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Decline reason deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Cannot delete a default decline reason
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-App-Key
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    SortOrder:
      type: string
      enum: [recent, top]

    RequestStatus:
      type: string
      enum: [open, planned, in_progress, shipped, declined]

    RequestSource:
      type: string
      enum: [sdk, console]

    AppRegistration:
      type: object
      required: [id, name, apiKey, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        apiKey:
          type: string
          description: Plaintext API key, shown once only.
        createdAt:
          type: string
          format: date-time

    App:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Request:
      type: object
      required: [id, appId, title, body, status, source, score, authorDisplayName, createdAt, updatedAt]
      properties:
        id:
          type: string
        appId:
          type: string
        authorId:
          type: ["string", "null"]
        title:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/RequestStatus"
        source:
          $ref: "#/components/schemas/RequestSource"
        score:
          type: integer
        mergedIntoId:
          type: ["string", "null"]
        declineReason:
          type: ["string", "null"]
        declineReasonId:
          type: ["string", "null"]
        declineReasonLabel:
          type: ["string", "null"]
        authorDisplayName:
          type: string
        authorExternalUserId:
          type: ["string", "null"]
        authorAvatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedRequests:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Request"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    User:
      type: object
      required: [id, sessionToken, externalUserId, displayName, createdAt]
      properties:
        id:
          type: string
        sessionToken:
          type: string
        externalUserId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    Vote:
      type: object
      required: [id, requestId, userId, value, createdAt]
      properties:
        id:
          type: string
        requestId:
          type: string
        userId:
          type: string
        value:
          type: integer
        createdAt:
          type: string
          format: date-time

    VoteResult:
      type: object
      required: [newScore]
      properties:
        vote:
          description: The vote record, or null if the vote was removed.
          $ref: "#/components/schemas/Vote"
        newScore:
          type: integer
          description: Updated total score for the request.

    DeclineReason:
      type: object
      required: [id, appId, label, isDefault, createdAt]
      properties:
        id:
          type: string
        appId:
          type: string
        label:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ApiError:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
