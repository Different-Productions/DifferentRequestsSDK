openapi: 3.1.0
info:
  title: DifferentRequests SDK API
  description: Feature request management API for mobile and web apps.
  version: 1.0.0

servers:
  - url: https://kstb23efj8.execute-api.us-east-1.amazonaws.com
    description: Production
  - url: https://urvselrxwj.execute-api.us-east-1.amazonaws.com
    description: Development

security:
  - ApiKeyAuth: []

paths:
  /apps/{appId}:
    get:
      operationId: getApp
      summary: Get app metadata
      security:
        - ApiKeyAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      operationId: createUser
      summary: Create or update an SDK user
      description: Registers a user and returns a session token for authenticated operations.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalUserId, displayName]
              properties:
                externalUserId:
                  type: string
                  minLength: 1
                displayName:
                  type: string
                  minLength: 1
                avatarUrl:
                  type: string
                  format: uri
                email:
                  type: string
                  format: email
                traits:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: User created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests:
    get:
      operationId: listRequests
      summary: List feature requests
      security:
        - ApiKeyAuth: []
      parameters:
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/SortOrder"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RequestStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRequests"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: submitRequest
      summary: Submit a new feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests/search:
    get:
      operationId: searchRequests
      summary: Search requests by title
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Matching requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests/{requestId}:
    get:
      operationId: getRequest
      summary: Get a single feature request
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        "301":
          description: Request was merged into another
          content:
            application/json:
              schema:
                type: object
                required: [mergedIntoId]
                properties:
                  mergedIntoId:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{requestId}/vote:
    post:
      operationId: vote
      summary: Vote on a feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: integer
                  enum: [1, -1, 0]
                  description: "1 = upvote, -1 = downvote, 0 = remove vote"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{requestId}/comments:
    get:
      operationId: listComments
      summary: List comments on a feature request
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of comments, oldest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedComments"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: postComment
      summary: Post a comment on a feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 2000
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{requestId}/comments/{commentId}:
    delete:
      operationId: deleteComment
      summary: Delete a comment. Own comments only — no admin delete from the SDK.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Comment deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /devices:
    post:
      operationId: registerDevice
      summary: Register or refresh an APNs device token for the authenticated user
      description: >
        Idempotent — registering the same token again does not create a
        duplicate. Send the lowercase-hex representation of the raw token
        handed back by `application(_:didRegisterForRemoteNotificationsWithDeviceToken:)`.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Device registered or refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegistration"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /devices/{token}:
    delete:
      operationId: unregisterDevice
      summary: Unregister a device token
      description: A no-op (still 204) if the token was never registered or was already removed.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Device unregistered (or was already absent)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requests/{requestId}/follow:
    post:
      operationId: followRequest
      summary: Explicitly follow a feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Followed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: unfollowRequest
      summary: Explicitly unfollow a feature request
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unfollowed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /requests/{requestId}/followers:
    get:
      operationId: getFollowerCount
      summary: Get a feature request's follower count. Never exposes the follower list.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Follower count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowerCount"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/follows:
    get:
      operationId: listMyFollows
      summary: List the authenticated user's followed requests, most recently followed first
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of followed requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFollows"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications:
    get:
      operationId: listMyNotifications
      summary: List the authenticated user's in-app inbox, most recent first
      description: >
        Populated by the async notification fan-out worker off status
        changes and new comments on requests the user follows — never
        written synchronously by the request that triggered it.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated in-app inbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNotifications"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      summary: Get the authenticated user's unread in-app notification count
      description: For driving a badge — call this rather than paginating the full inbox just to count unread rows.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadNotificationCount"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      summary: Mark one in-app notification read
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /decline-reasons:
    get:
      operationId: listDeclineReasons
      summary: List decline reasons for the app
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: List of decline reasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeclineReason"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /roadmap:
    get:
      operationId: listRoadmap
      summary: List the app's public roadmap (Pro)
      description: Planned/InProgress/Shipped requests not explicitly hidden from the roadmap, sorted pinned-first then by manual order then by recency.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Roadmap-eligible requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

  /changelog:
    get:
      operationId: listChangelog
      summary: List the app's published changelog entries ("What's New") (Pro)
      description: Most recent first, cursor-paginated. Drafts are never returned here — only entries published from the console.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated published changelog entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedChangelogEntries"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-App-Key
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Caller is not permitted to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PaymentRequired:
      description: The app's plan does not include this feature
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    SortOrder:
      type: string
      enum: [recent, top]

    RequestStatus:
      type: string
      enum: [open, planned, in_progress, shipped, declined]

    RequestSource:
      type: string
      enum: [sdk, console]

    App:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string

    Request:
      type: object
      required: [id, appId, title, body, status, source, score, roadmapPinned, roadmapOrder, roadmapVisible, authorDisplayName, createdAt, updatedAt]
      properties:
        id:
          type: string
        appId:
          type: string
        authorId:
          type: ["string", "null"]
        title:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/RequestStatus"
        source:
          $ref: "#/components/schemas/RequestSource"
        score:
          type: integer
        myVote:
          type: ["integer", "null"]
        roadmapPinned:
          type: boolean
        roadmapOrder:
          type: integer
        roadmapVisible:
          type: boolean
        mergedIntoId:
          type: ["string", "null"]
        declineReason:
          type: ["string", "null"]
        declineReasonId:
          type: ["string", "null"]
        declineReasonLabel:
          type: ["string", "null"]
        authorDisplayName:
          type: string
        authorExternalUserId:
          type: ["string", "null"]
        authorAvatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PaginatedRequests:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Request"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    User:
      type: object
      required: [id, sessionToken, externalUserId, displayName, createdAt]
      properties:
        id:
          type: string
        sessionToken:
          type: string
        externalUserId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        traits:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string

    Vote:
      type: object
      required: [id, requestId, userId, value, createdAt]
      properties:
        id:
          type: string
        requestId:
          type: string
        userId:
          type: string
        value:
          type: integer
        createdAt:
          type: string

    VoteResult:
      type: object
      required: [newScore]
      properties:
        vote:
          description: The vote record, or null if the vote was removed.
          $ref: "#/components/schemas/Vote"
        newScore:
          type: integer
          description: Updated total score for the request.

    DeclineReason:
      type: object
      required: [id, appId, label, isDefault, createdAt]
      properties:
        id:
          type: string
        appId:
          type: string
        label:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string

    DeviceRegistration:
      type: object
      required: [tokenHash, createdAt, updatedAt]
      properties:
        tokenHash:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    Comment:
      type: object
      required: [id, requestId, appId, authorId, authorDisplayName, isOfficial, body, hidden, createdAt]
      properties:
        id:
          type: string
        requestId:
          type: string
        appId:
          type: string
        authorId:
          type: string
        authorDisplayName:
          type: string
        isOfficial:
          type: boolean
        body:
          type: string
        hidden:
          type: boolean
        createdAt:
          type: string

    PaginatedComments:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    Follow:
      type: object
      required: [requestId, userId, appId, createdAt]
      properties:
        requestId:
          type: string
        userId:
          type: string
        appId:
          type: string
        createdAt:
          type: string

    PaginatedFollows:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Follow"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    FollowerCount:
      type: object
      required: [count]
      properties:
        count:
          type: integer

    Notification:
      type: object
      required: [id, requestId, type, status, commentId, read, createdAt]
      properties:
        id:
          type: string
        requestId:
          type: string
        type:
          type: string
          enum: [status_change, comment, official_reply, changelog_published]
        status:
          type: ["string", "null"]
          description: New status — present only for a status_change notification.
        commentId:
          type: ["string", "null"]
          description: Source comment — present only for a comment/official_reply notification.
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ChangelogEntry:
      type: object
      required: [id, title, body, requestIds, published, publishedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        requestIds:
          type: array
          items:
            type: string
        published:
          type: boolean
          description: Always true — the SDK only ever sees published entries, never drafts.
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedChangelogEntries:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChangelogEntry"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    PaginatedNotifications:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        cursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    UnreadNotificationCount:
      type: object
      required: [count]
      properties:
        count:
          type: integer

    ApiError:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
